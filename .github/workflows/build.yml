name: Build ForceCriminalMenu
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/theos/docker:latest

    steps:
      - uses: actions/checkout@v4

      - name: 编译
        run: |
          cd ForceCriminalMenu
          make clean package FINALPACKAGE=1

      - name: 上传产物
        uses: actions/upload-artifact@v4
        with:
          name: ForceCriminalMenu
          path: ForceCriminalMenu/packages/
