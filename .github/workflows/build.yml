name: Build iOS dylib

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # 允许手动触发

jobs:
  build:
    runs-on: macos-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Build dylib (arm64)
      run: |
        mkdir -p build
        
        # 编译 arm64 架构
        clang++ -arch arm64 \
          -isysroot $(xcrun --sdk iphoneos --show-sdk-path) \
          -miphoneos-version-min=11.0 \
          -fPIC -shared -O2 \
          SimpleForceCriminal.mm \
          -o build/SimpleForceCriminal_arm64.dylib
        
        # 签名
        codesign -f -s - build/SimpleForceCriminal_arm64.dylib
        
        # 显示信息
        ls -lh build/
        lipo -info build/SimpleForceCriminal_arm64.dylib
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: SimpleForceCriminal-dylib
        path: build/SimpleForceCriminal_arm64.dylib
        retention-days: 30
    
    - name: Create Release
